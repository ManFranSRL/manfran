<!DOCTYPE html>
<!-- @dsCard group="Social" name="Contacto · 9:16 reel" subtitle="540×960 — screenshot a 2x para 1080×1920 Instagram" viewport="540x960" -->
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto MANFRAN — 9:16</title>
<style>

/* ─── RESET ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── FONTS ──────────────────────────────────────── */
@font-face {
  font-family: "Avenir";
  src: url("assets/fonts/avenir-next-condensed-bold.ttf") format("truetype");
  font-weight: 700; font-display: block;
}
@font-face {
  font-family: "Helv";
  src: url("assets/fonts/helvetica-light.ttf") format("truetype");
  font-weight: 300; font-display: block;
}
@font-face {
  font-family: "Helv";
  src: url("assets/fonts/Helvetica.ttf") format("truetype");
  font-weight: 400; font-display: block;
}

/* ─── TOKENS ─────────────────────────────────────── */
:root {
  --blue:       #00A0D8;
  --blue-dark:  #0088B8;
  --black:      #1A1A1A;
  --white:      #FFFFFF;
  --display:    "Avenir", "Arial Black", Arial, sans-serif;
  --body:       "Helv", "Helvetica Neue", Arial, sans-serif;
  --glass-bg:   rgba(255,255,255,0.06);
  --glass-b:    rgba(255,255,255,0.10);
  --input-bg:   rgba(255,255,255,0.05);
  --input-b:    rgba(255,255,255,0.10);
  --text-muted: rgba(255,255,255,0.50);
  --text-ph:    rgba(255,255,255,0.28);
}

/* ─── CANVAS ─────────────────────────────────────── */
html {
  width:  540px;
  height: 960px;
}
body {
  width:  540px;
  height: 960px;
  overflow: hidden;
  position: relative;
  font-family: var(--body);
  color: var(--white);
  background: #111111;
}

/* ─── BACKGROUND ─────────────────────────────────── */
/* Subtle blue ambient at top + faint grid texture */
.bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%,
      rgba(0,160,216,0.10) 0%,
      transparent 70%),
    #111111;
}
/* Horizontal rule divider between info and form zones */
.divider {
  position: absolute;
  left: 28px; right: 28px;
  top: 374px;
  height: 1px;
  background: rgba(255,255,255,0.08);
  z-index: 1;
}

/* Blue top stripe */
.stripe {
  position: absolute;
  inset-x: 0; top: 0;
  height: 3px;
  background: var(--blue);
  z-index: 3;
}

/* ─── CONTENT LAYER ──────────────────────────────── */
.content {
  position: relative; z-index: 2;
  height: 960px;
  padding: 40px 28px 32px;
  display: flex;
  flex-direction: column;
}

/* ─── INFO BLOCK (top ~40%) ──────────────────────── */
.info {
  flex-shrink: 0;
  padding-bottom: 28px;
}

.wordmark {
  display: block;
  height: 28px;
  width: auto;
  object-fit: contain;
  object-position: left center;
  margin-bottom: 24px;
}

.eyebrow {
  font-family: var(--display);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--blue);
  margin-bottom: 8px;
}

.title {
  font-family: var(--display);
  font-size: 46px; font-weight: 700;
  text-transform: uppercase;
  line-height: 0.96;
  letter-spacing: -0.015em;
  color: var(--white);
  margin-bottom: 12px;
}
.title .accent { color: var(--blue); }

.subtitle {
  font-family: var(--body);
  font-size: 13px; font-weight: 300;
  line-height: 1.6;
  color: var(--text-muted);
  margin-bottom: 20px;
}

/* Contact details */
.contact-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  list-style: none;
}
.contact-list li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--body);
  font-size: 13px;
  color: rgba(255,255,255,0.60);
}
.contact-list .icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 6px;
  background: rgba(0,160,216,0.12);
  border: 1px solid rgba(0,160,216,0.20);
  flex-shrink: 0;
}
.contact-list .icon svg {
  width: 14px; height: 14px;
  stroke: var(--blue);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ─── FORM BLOCK (bottom ~60%) ───────────────────── */
.form-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-top: 24px;
}

.field { display: flex; flex-direction: column; gap: 4px; }

label {
  font-family: var(--display);
  font-size: 10px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.70);
}

input, textarea {
  font-family: var(--body);
  font-size: 13px; font-weight: 400;
  color: var(--white);
  background: var(--input-bg);
  border: 1px solid var(--input-b);
  border-radius: 8px;
  padding: 10px 14px;
  outline: none;
  width: 100%;
}
input::placeholder, textarea::placeholder {
  color: var(--text-ph);
}
textarea { resize: none; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ─── BUTTON ─────────────────────────────────────── */
.btn {
  display: block; width: 100%;
  padding: 13px;
  font-family: var(--display);
  font-size: 13px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--white);
  background: var(--blue);
  border: none; border-radius: 8px;
  text-align: center;
  cursor: default;
}

</style>
</head>
<body>

<div class="bg"></div>
<div class="stripe"></div>
<div class="divider"></div>

<div class="content">

  <!-- ── INFO BLOCK ── -->
  <div class="info">

    <img class="wordmark" src="public/assets/email/wordmark.png" alt="MANFRAN">

    <p class="eyebrow">Contacto</p>
    <h1 class="title">
      Hablemos<br>
      <span class="accent">de tu operación</span>
    </h1>
    <p class="subtitle">
      Contanos qué necesitás y te respondemos<br>
      dentro de las <strong style="color:#fff;">24 hs hábiles</strong> con una propuesta a medida.
    </p>

    <ul class="contact-list">
      <li>
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
        info@manfran.com
      </li>
      <li>
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.25h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
        </span>
        +54 11 5141-2350
      </li>
      <li>
        <span class="icon">
          <svg viewBox="0 0 24 24"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
        </span>
        Buenos Aires, Argentina
      </li>
    </ul>
  </div>

  <!-- ── FORM BLOCK ── -->
  <div class="form-block">

    <div class="row2">
      <div class="field">
        <label>Nombre *</label>
        <input type="text" value="Andrea Lemos">
      </div>
      <div class="field">
        <label>Email *</label>
        <input type="email" value="andrea@lemos-imp.com">
      </div>
    </div>

    <div class="field">
      <label>Empresa</label>
      <input type="text" value="Lemos Importaciones SRL">
    </div>

    <div class="field" style="flex:1;">
      <label>¿En qué te podemos ayudar? *</label>
      <textarea rows="4" style="flex:1;">Hola, estamos evaluando importar componentes electrónicos desde Asia de forma regular. Quisiéramos coordinar una llamada.</textarea>
    </div>

    <div class="btn">Enviar mensaje</div>

  </div>

</div>
</body>
</html>
