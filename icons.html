<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 26px; background: var(--white); display:flex; flex-direction:column; gap: 18px; }
  .row { display:flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .ico {
    width: 40px; height: 40px;
    display:flex; align-items:center; justify-content:center;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--fg);
  }
  .ico.accent { color: var(--blue); border-color: var(--blue); }
  .ico.dark { background: var(--black); color: var(--white); border-color: var(--black); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); margin-top: 6px; text-align: center; }
  .item { display:flex; flex-direction:column; align-items:center; }
  svg { width: 22px; height: 22px; stroke-width: 1.5; }
</style>
</head>
