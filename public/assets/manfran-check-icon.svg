<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 512 512" role="img" aria-labelledby="title desc" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <title id="title">MANFRAN Check Icon</title>
  <desc id="desc">Check icon aligned to the MANFRAN WhatsApp icon direction and brand colors.</desc>

  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="240" />
    </clipPath>
  </defs>

  <!-- Main MANFRAN blue circle -->
  <circle cx="256" cy="256" r="240" fill="#00A0D8" />

  <!-- Matching diagonal charcoal depth, same direction as the WhatsApp icon -->
  <g clip-path="url(#circleClip)">
    <path d="M512 0 0 512h512V0Z" fill="#1A1A1A" opacity="0.18" />
  </g>

  <!-- White check mark -->
  <path d="M158 262L224 328L356 194" fill="none" stroke="#FFFFFF" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Soft highlight on the check for a polished feel -->
  <path d="M170 250L224 304L344 182" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.24" />
</svg>
